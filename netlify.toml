[build]
  command = "npm run build"
  publish = "dist"

# SECURITY HEADERS - Applied to all routes
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self), microphone=(), camera=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://cdn.jsdelivr.net https://www.googletagmanager.com https://googleads.g.doubleclick.net https://www.googleadservices.com https://*.tiktok.com https://*.tiktokcdn-us.com https://*.ttwstatic.com; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://fonts.googleapis.com https://*.ttwstatic.com https://*.tiktok.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com https://*.ttwstatic.com https://*.tiktok.com; worker-src 'self' blob:; connect-src 'self' blob: https://*.supabase.co wss://*.supabase.co https://api.supabase.co https://translate.googleapis.com https://unpkg.com https://cdn.jsdelivr.net https://www.google-analytics.com https://ad.doubleclick.net https://www.google.com https://www.googleadservices.com https://script.google.com https://*.tiktok.com https://*.tiktokcdn-us.com https://*.ttwstatic.com; frame-src 'self' https://www.youtube-nocookie.com https://www.youtube.com https://*.supabase.co https://view.officeapps.live.com https://*.tiktok.com; media-src 'self' blob: https://*.supabase.co; frame-ancestors 'none'; object-src 'none'"
    Cache-Control = "public, max-age=0, must-revalidate"

# CACHING - Immutable assets
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# BLOCK SUSPICIOUS PATHS
[[redirects]]
  from = "/*.env*"
  to = "/404"
  status = 404

[[redirects]]
  from = "/wp-admin*"
  to = "/404"
  status = 404

[[redirects]]
  from = "/wp-login*"
  to = "/404"
  status = 404

[[redirects]]
  from = "/.git*"
  to = "/404"
  status = 404

[[redirects]]
  from = "/config*"
  to = "/404"
  status = 404